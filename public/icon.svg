<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Srinibytes Teal-to-Indigo gradient -->
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <!-- Subtle glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Inner shadow for depth -->
    <radialGradient id="bg-gradient" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A1A24"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
  </defs>

  <!-- Background: Obsidian with subtle depth -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg-gradient)"/>

  <!-- Vault shield outline (subtle, conveys "vault" / security) -->
  <path d="M256 88 C160 88 108 140 108 200 L108 280 C108 370 180 424 256 424 C332 424 404 370 404 280 L404 200 C404 140 352 88 256 88Z"
        fill="none" stroke="url(#brand-gradient)" stroke-width="3" opacity="0.25"/>

  <!-- Play triangle (bold, centered, teal-indigo gradient with glow) -->
  <path d="M208 168 L208 344 L368 256 Z"
        fill="url(#brand-gradient)" filter="url(#glow)" opacity="0.95"/>

  <!-- Subtle keyhole accent at top of shield (vault detail) -->
  <circle cx="256" cy="140" r="12" fill="url(#brand-gradient)" opacity="0.4"/>
  <rect x="252" y="140" width="8" height="20" rx="4" fill="url(#brand-gradient)" opacity="0.4"/>
</svg>
