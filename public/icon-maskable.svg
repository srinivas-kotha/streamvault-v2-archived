<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg-gradient" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A1A24"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
  </defs>

  <!-- Full opaque background (required for maskable — no rounded corners, OS applies mask) -->
  <rect width="512" height="512" fill="url(#bg-gradient)"/>

  <!-- Content within 80% safe zone (51.2px inset each side = content area 409.6x409.6) -->
  <!-- Shield outline scaled to safe zone -->
  <path d="M256 108 C178 108 136 148 136 200 L136 272 C136 348 194 396 256 396 C318 396 376 348 376 272 L376 200 C376 148 334 108 256 108Z"
        fill="none" stroke="url(#brand-gradient)" stroke-width="2.5" opacity="0.25"/>

  <!-- Play triangle (centered in safe zone) -->
  <path d="M220 178 L220 334 L356 256 Z"
        fill="url(#brand-gradient)" filter="url(#glow)" opacity="0.95"/>

  <!-- Keyhole accent -->
  <circle cx="256" cy="152" r="10" fill="url(#brand-gradient)" opacity="0.4"/>
  <rect x="253" y="152" width="6" height="16" rx="3" fill="url(#brand-gradient)" opacity="0.4"/>
</svg>
