name: Deploy

on:
  workflow_run:
    workflows: [Validate]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 60s
          command_timeout: 8m
          script: |
            set -e
            echo "Pulling latest code..."
            cd ~/streamvault-frontend
            git fetch origin main
            git reset --hard origin/main

            echo "Rebuilding frontend container..."
            cd ~/ai-orchestration
            docker compose up -d --build streamvault-frontend

            echo "Waiting for health check..."
            for i in $(seq 1 18); do
              if curl -sf http://localhost:3002/ > /dev/null 2>&1; then
                echo "Frontend is healthy!"
                exit 0
              fi
              echo "Attempt $i/18 - waiting 5s..."
              sleep 5
            done

            echo "Health check failed after 90s"
            docker logs streamvault_frontend --tail 50
            docker restart streamvault_frontend
            exit 1

      - name: Cleanup
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 60s
          script: docker image prune -f
